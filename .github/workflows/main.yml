name: Full Stack CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.9'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/pages/**', 'frontend/components/**', 'frontend/styles/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('frontend/package-lock.json') }}-

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Install backend dependencies
        run: cd backend && npm install --legacy-peer-deps

      - name: Install frontend dependencies
        run: cd frontend && npm install --legacy-peer-deps

      - name: Build backend
        run: cd backend && npm run build

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Run backend tests
        run: cd backend && npm test

      - name: Run frontend tests
        run: cd frontend && npm test

      - name: Compile Hardhat contracts
        run: node node_modules/hardhat/dist/src/cli.js compile

      - name: Upload frontend build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next/
          if-no-files-found: warn

  foundry-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install OpenZeppelin Contracts
        run: |
          forge install OpenZeppelin/openzeppelin-contracts@v4.9.6 --no-git
          forge install foundry-rs/forge-std --no-git

      - name: Compile contracts
        run: forge build --sizes

      - name: Run Foundry unit and fuzz tests
        run: forge test --match-path "tests/foundry/FlashloanArbitrage.t.sol" -v
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}

      - name: Run Foundry fork tests (skip if no RPC)
        run: forge test --match-path "tests/foundry/FlashloanArbitrage.fork.t.sol" -v
        continue-on-error: true
        env:
          MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}

      - name: Generate coverage report
        run: forge coverage --match-path "tests/foundry/FlashloanArbitrage.t.sol" --report lcov
        continue-on-error: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: foundry-coverage
          path: lcov.info
          if-no-files-found: warn

  slither-security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry (for Slither compilation)
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install OpenZeppelin Contracts
        run: |
          forge install OpenZeppelin/openzeppelin-contracts@v4.9.6 --no-git
          forge install foundry-rs/forge-std --no-git

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        with:
          target: contracts/
          slither-args: >-
            --filter-paths "lib/"
            --exclude-informational
            --checklist
        continue-on-error: true
